name: "Build"

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * 0"
  push:
    branches:
      - 'main'
    paths:
      - "build-*.sh"
      - ".github/workflows/*.yml"
      - "wslconf/*"

permissions:
  contents: write  

jobs:
  build-x86_64:
    runs-on: ubuntu-latest
    outputs:
      DATE: ${{ steps.start_build.outputs.DATE }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - id: start_build
        run: |
          bash build-testing.sh
          bash build-sid.sh
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: x86_64
          path: ./*.wsl

  build-aarch64:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - id: start_build
        run: |
          bash build-testing.sh
          bash build-sid.sh
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: aarch64
          path: ./*.wsl

  release:
    runs-on: ubuntu-latest
    needs: [build-x86_64, build-aarch64]
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v8

      - name: Release testing
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.build-x86_64.outputs.DATE }}-testing
          name: Debian Testing Build ${{ needs.build-x86_64.outputs.DATE }}
          files: |
            aarch64/debian-testing*.wsl
            x86_64/debian-testing*.wsl
          preserve_order: true

      - name: Release sid
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.build-x86_64.outputs.DATE }}-sid
          name: Debian Sid Build ${{ needs.build-x86_64.outputs.DATE }}
          files: |
            aarch64/debian-sid*.wsl
            x86_64/debian-sid*.wsl
          preserve_order: true
          make_latest: true

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
